<div class="common-page">
    <div class="common-page-body">
        <div class="logo">
            <img src="/images/logo.png" alt="Logo">
        </div>
        <h1>Создайте аккаунт</h1>
        <form>
            <div class="input-group">
                <div class="input-group-text bg-body-secondary">
                    <span><img src="/images/person.png" alt="avatar"></span>
                </div>
                <input type="text" class="form-control" placeholder="Имя" id="name">
                <span id="name-error" class="error invalid-feedback">Заполните имя</span>
            </div>
            <div class="input-group">
                <div class="input-group-text bg-body-secondary">
                    <span><img src="/images/person.png" alt="avatar"></span>
                </div>
                <input type="text" class="form-control" placeholder="Фамилия" id="lastName">
                <span id="lastName-error" class="error invalid-feedback">Заполните фамилию</span>
            </div>
            <div class="input-group">
                <div class="input-group-text bg-body-secondary">
                    <span><img src="/images/mail.png" alt="email"></span>
                </div>
                <input type="email" class="form-control" placeholder="Электронная почта" id="email">
                <span id="email-error" class="error invalid-feedback">Введите корректный E-mail</span>
            </div>
            <div class="input-group ">
                <div class="input-group-text bg-body-secondary">
                    <span><img src="/images/lock.png" alt="lock"></span>
                </div>
                <input type="password" class="form-control " placeholder="Пароль" id="password">
                <span id="password-error" class="error invalid-feedback "></span>
            </div>
            <div class="input-group">
                <div class="input-group-text bg-body-secondary">
                    <span><img src="/images/lock.png" alt="lock"></span>
                </div>
                <input type="password" class="form-control" placeholder="Подтверждение пароля" id="password-repeat">
                <span id="password-repeat-error" class="error invalid-feedback ">Пароль и повторение пароля должны совпадать</span>
            </div>
            <button type="button" class="btn btn-primary" id="process-button">Войти
            </button>
        </form>
        <div class="social-auth-links" style="text-align:center">
            <span>Уже есть аккаунт?</span>
            <a href="/login">Войдите в систему </a>
        </div>
    </div>
</div>
